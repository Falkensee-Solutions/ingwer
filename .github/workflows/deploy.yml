name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein gleichzeitiger Pages-Deploy; laufenden Deploy aber nicht abbrechen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (Next.js static export)
        env:
          # Project-Page-Hosting → URL ist https://<org>.github.io/<repo>/.
          # Repo-Name in Kleinbuchstaben verwenden (GitHub Pages ist case-sensitive).
          NEXT_PUBLIC_BASE_PATH: /ingwer
          NEXT_PUBLIC_SITE_URL: https://falkensee-solutions.github.io/ingwer
        run: npm run build

      - name: Disable Jekyll
        # _next/* würde sonst von GitHub Pages' Jekyll-Pipeline ignoriert.
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
